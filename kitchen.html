<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YaYa Chicken · Кухня</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F4821F;
    --orange-dark: #c96200;
    --bg: #0f0f0f;
    --card-bg: #1a1a1a;
    --card-cooking: #1a1200;
    --card-done: #0a1a0a;
    --border: #2a2a2a;
    --border-cooking: #c96200;
    --border-done: #1a6b1a;
    --text: #f0f0f0;
    --text2: #888;
    --green: #22c55e;
    --yellow: #fbbf24;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: #111;
    border-bottom: 2px solid #222;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--orange);
    letter-spacing: 2px;
    line-height: 1;
  }
  .logo span { color: #555; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--text2);
    letter-spacing: 2px;
    min-width: 80px;
    text-align: right;
  }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s infinite;
    flex-shrink: 0;
  }
  .status-dot.offline { background: #555; animation: none; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── COLUMNS ── */
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: calc(100vh - 68px);
  }

  .column {
    padding: 20px 16px;
    border-right: 1px solid var(--border);
  }
  .column:last-child { border-right: none; }

  .column-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .column-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
  }

  .column-count {
    background: var(--border);
    color: var(--text2);
    font-size: 13px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* ── ORDER CARD ── */
  .order-card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.3s, background 0.3s, transform 0.1s;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .order-card.cooking {
    background: var(--card-cooking);
    border-color: var(--border-cooking);
  }
  .order-card.done {
    background: var(--card-done);
    border-color: var(--border-done);
    opacity: 0.7;
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px 10px;
    gap: 8px;
  }

  .order-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--orange);
    letter-spacing: 1px;
    line-height: 1;
    flex-shrink: 0;
  }
  .order-card.done .order-num { color: var(--green); }

  .order-meta {
    flex: 1;
    min-width: 0;
  }

  .order-time {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 2px;
  }

  .order-elapsed {
    font-size: 13px;
    font-weight: 800;
    color: var(--yellow);
  }
  .order-elapsed.slow { color: #ef4444; }
  .order-card.done .order-elapsed { color: var(--text2); }

  .order-source {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    padding: 2px 7px;
    border: 1px solid var(--border);
    border-radius: 10px;
    flex-shrink: 0;
  }

  .card-items {
    padding: 0 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 6px;
  }

  .item-name-wrap { flex: 1; min-width: 0; }

  .item-name {
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.3;
  }

  .item-desc {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    line-height: 1.3;
    margin-top: 2px;
  }

  .item-qty {
    font-size: 14px;
    font-weight: 900;
    color: var(--orange);
    flex-shrink: 0;
  }
  .order-card.done .item-qty { color: var(--green); }

  .card-address {
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-comment {
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 600;
    color: #b08040;
    background: #1a1500;
    border-top: 1px solid #2a2000;
  }

  .card-btn-wrap {
    padding: 10px 14px 14px;
  }

  .card-btn {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .btn-start {
    background: var(--orange);
    color: white;
  }
  .btn-start:hover { background: var(--orange-dark); transform: scale(1.01); }
  .btn-start:active { transform: scale(0.98); }

  .btn-done {
    background: var(--green);
    color: white;
  }
  .btn-done:hover { filter: brightness(0.9); transform: scale(1.01); }
  .btn-done:active { transform: scale(0.98); }

  /* ── EMPTY STATE ── */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--text2);
    gap: 12px;
  }
  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-text { font-size: 15px; font-weight: 700; }

  /* ── AUDIO TOGGLE ── */
  .sound-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sound-btn:hover { border-color: var(--orange); color: var(--orange); }
  .sound-btn.on { border-color: var(--green); color: var(--green); }

  /* ── NOTIFICATION TOAST ── */
  .toast {
    position: fixed;
    top: 80px;
    right: 20px;
    background: var(--orange);
    color: white;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 800;
    z-index: 9999;
    animation: toastIn 0.3s ease;
    box-shadow: 0 4px 20px rgba(244,130,31,0.5);
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── TOTALS BAR ── */
  .totals {
    display: flex;
    gap: 6px;
  }
  .total-chip {
    font-size: 12px;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid;
  }
  .chip-new   { color: var(--orange); border-color: var(--orange); background: rgba(244,130,31,0.1); }
  .chip-cook  { color: var(--yellow); border-color: var(--yellow); background: rgba(251,191,36,0.1); }
  .chip-done  { color: var(--green);  border-color: var(--green);  background: rgba(34,197,94,0.1); }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .columns { grid-template-columns: 1fr; }
    .column { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="logo">YaYa <span>KITCHEN</span></div>
    <div class="totals" id="totals"></div>
  </div>
  <div class="header-right">
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()" title="Звук уведомлений">🔔</button>
    <div class="status-dot" id="statusDot"></div>
    <div class="clock" id="clock">00:00</div>
  </div>
</div>

<div class="columns">
  <!-- Новые / Готовятся -->
  <div class="column">
    <div class="column-header">
      <div class="column-title" style="color: var(--yellow);">🔥 Готовятся</div>
      <div class="column-count" id="count-active">0</div>
    </div>
    <div id="col-active"></div>
  </div>

  <!-- Готово -->
  <div class="column">
    <div class="column-header">
      <div class="column-title" style="color: var(--green);">✅ Готово</div>
      <div class="column-count" id="count-done">0</div>
    </div>
    <div id="col-done"></div>
  </div>
</div>

<script>
const SERVER = 'https://bonded-ditch-divisible.ngrok-free.dev';
let orders = [];
let prevIds = new Set();
let soundEnabled = true;
let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBeep(freq = 880, dur = 0.18, gain = 0.4) {
  if (!soundEnabled) return;
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    g.gain.setValueAtTime(gain, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function playNewOrder() {
  // Three ascending beeps
  playBeep(660, 0.12); 
  setTimeout(() => playBeep(780, 0.12), 140);
  setTimeout(() => playBeep(940, 0.2),  280);
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundBtn');
  btn.textContent = soundEnabled ? '🔔' : '🔕';
  btn.className = 'sound-btn' + (soundEnabled ? ' on' : '');
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Clock ────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
}
setInterval(updateClock, 1000);
updateClock();

// ── Time elapsed ─────────────────────────────────────────────────────
function elapsed(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return diff + ' сек';
  const m = Math.floor(diff / 60);
  const s = diff % 60;
  return m + ':' + String(s).padStart(2,'0');
}

function isSlowOrder(ts) {
  return (Date.now() - ts) > 25 * 60 * 1000; // > 25 минут — красный
}

// ── Fetch orders ─────────────────────────────────────────────────────
let lastOrdersHash = '';

async function fetchOrders() {
  try {
    const r = await fetch(`${SERVER}/kitchen`, { cache: 'no-store', headers: { 'ngrok-skip-browser-warning': '1' } });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    document.getElementById('statusDot').className = 'status-dot';

    const newOrders = data.orders || [];
    const newIds = new Set(newOrders.map(o => o.id));

    // Звук только на действительно новые заказы
    let hasNew = false;
    for (const o of newOrders) {
      if (!prevIds.has(o.id) && o.status === 'new') hasNew = true;
    }
    if (hasNew && prevIds.size > 0) {
      playNewOrder();
      showToast('🍗 Новый заказ!');
    }
    prevIds = newIds;

    // Не перерисовываем если ничего не изменилось — убирает моргание
    const hash = JSON.stringify(newOrders.map(o => ({ id: o.id, status: o.status, items: o.items })));
    if (hash === lastOrdersHash) return;
    lastOrdersHash = hash;

    orders = newOrders;
    render();
  } catch(e) {
    document.getElementById('statusDot').className = 'status-dot offline';
    console.error('fetch error:', e);
  }
}

// ── Change status ─────────────────────────────────────────────────────
async function setStatus(id, status) {
  initAudio();
  playBeep(status === 'cooking' ? 660 : 880, 0.15, 0.35);
  // Оптимистичное обновление — сразу меняем локально без перезагрузки
  const o = orders.find(x => x.id === id);
  if (o) {
    o.status = status;
    lastOrdersHash = ''; // сбрасываем чтобы следующий fetch перерисовал
    render();
  }
  try {
    await fetch(`${SERVER}/kitchen/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
      body: JSON.stringify({ id, status })
    });
  } catch(e) {
    console.error(e);
  }
}

// ── Render ────────────────────────────────────────────────────────────
function formatTime(ts) {
  return new Date(ts).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
}

function renderCard(o) {
  const slow = isSlowOrder(o.created_at) && o.status !== 'done';
  const elapsedStr = elapsed(o.created_at);

  const itemsHtml = o.items.map(i => `
    <div class="card-item">
      <div class="item-name-wrap">
        <div class="item-name">${i.name}</div>
        ${i.desc ? `<div class="item-desc">${i.desc}</div>` : ''}
      </div>
      <div class="item-qty">×${i.qty}</div>
    </div>`
  ).join('');

  const addressHtml = o.address
    ? `<div class="card-address">📍 ${o.address}</div>`
    : '';

  const commentHtml = o.comment
    ? `<div class="card-comment">💬 ${o.comment}</div>`
    : '';

  let btnHtml = '';
  if (o.status === 'new') {
    btnHtml = `<div class="card-btn-wrap"><button class="card-btn btn-start" onclick="setStatus('${o.id}', 'cooking')">🔥 Начать готовить</button></div>`;
  } else if (o.status === 'cooking') {
    btnHtml = `<div class="card-btn-wrap"><button class="card-btn btn-done" onclick="setStatus('${o.id}', 'done')">✅ Готово — курьер едет!</button></div>`;
  }

  const source = o.source === 'webapp' ? 'Приложение' : 'Бот';

  return `
    <div class="order-card ${o.status === 'done' ? 'done' : o.status === 'cooking' ? 'cooking' : ''}" id="card-${o.id}">
      <div class="card-top">
        <div class="order-num">№${String(o.num).padStart(3,'0')}</div>
        <div class="order-meta">
          <div class="order-time">⏰ ${formatTime(o.created_at)}</div>
          <div class="order-elapsed ${slow ? 'slow' : ''}">${elapsedStr}</div>
        </div>
        <div class="order-source">${source}</div>
      </div>
      <div class="card-items">${itemsHtml}</div>
      ${addressHtml}
      ${commentHtml}
      ${btnHtml}
    </div>`;
}

function render() {
  const active = orders.filter(o => o.status !== 'done');
  const done   = orders.filter(o => o.status === 'done');

  // Totals
  const newC  = orders.filter(o => o.status === 'new').length;
  const cookC = orders.filter(o => o.status === 'cooking').length;
  const doneC = done.length;
  document.getElementById('totals').innerHTML = `
    ${newC  > 0 ? `<div class="total-chip chip-new">Новых: ${newC}</div>` : ''}
    ${cookC > 0 ? `<div class="total-chip chip-cook">Готовятся: ${cookC}</div>` : ''}
    ${doneC > 0 ? `<div class="total-chip chip-done">Готово: ${doneC}</div>` : ''}
  `;

  document.getElementById('count-active').textContent = active.length;
  document.getElementById('count-done').textContent = done.length;

  if (active.length === 0) {
    document.getElementById('col-active').innerHTML = `
      <div class="empty">
        <div class="empty-icon">🍽</div>
        <div class="empty-text">Нет активных заказов</div>
      </div>`;
  } else {
    document.getElementById('col-active').innerHTML = active.map(renderCard).join('');
  }

  if (done.length === 0) {
    document.getElementById('col-done').innerHTML = `
      <div class="empty">
        <div class="empty-icon">✅</div>
        <div class="empty-text">Выданных заказов нет</div>
      </div>`;
  } else {
    document.getElementById('col-done').innerHTML = done.map(renderCard).join('');
  }
}

// ── Update elapsed every 10s without full re-render ──────────────────
function updateElapsed() {
  orders.forEach(o => {
    const el = document.querySelector(`#card-${o.id} .order-elapsed`);
    if (el && o.status !== 'done') {
      el.textContent = elapsed(o.created_at);
      el.className = 'order-elapsed' + (isSlowOrder(o.created_at) ? ' slow' : '');
    }
  });
}

// Start
fetchOrders();
setInterval(fetchOrders, 5000);
setInterval(updateElapsed, 10000);
</script>
</body>
</html>
